<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Check-in - 4º Encontro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{

    background:#f2f2f2;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    padding:20px;

}

.card{

    width:100%;
    max-width:550px;

    background:white;

    border-radius:20px;

    padding:30px;

    box-shadow:0 10px 30px rgba(0,0,0,.20);

}

h1{

    text-align:center;

    color:#C62828;

    margin-bottom:10px;

}

.subtitulo{

    text-align:center;

    color:#666;

    margin-bottom:25px;

}

#reader{

    width:100%;

    border:3px dashed #C62828;

    border-radius:15px;

    overflow:hidden;

    min-height:320px;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#fafafa;

}

.status{

    margin-top:25px;

    text-align:center;

    font-size:18px;

    font-weight:bold;

    color:#555;

}

button{

    width:100%;

    margin-top:20px;

    padding:15px;

    border:none;

    border-radius:12px;

    background:#2E7D32;

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

}

button:hover{

    opacity:.9;

}

.ok{

    color:#2E7D32;

}

.erro{

    color:#C62828;

}

.alerta{

    color:#FF9800;

}

</style>

</head>

<body>

<div class="card">

<h1>CHECK-IN</h1>

<p class="subtitulo">

4º Encontro de Carros e Motos

</p>

<div id="reader">

Aguardando câmera...

</div>

<button id="btnCamera">

📷 INICIAR CÂMERA

</button>

<div id="status" class="status">

Clique para iniciar a câmera.

</div>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

const API="https://evento-checkin.ep-soares.workers.dev";

let scanner=null;

let lendo=false;

document
.getElementById("btnCamera")
.addEventListener("click",iniciarCamera);

async function iniciarCamera(){

    lendo=false;

    document.getElementById("btnCamera").style.display="none";

    document.getElementById("status").innerHTML="📷 Abrindo câmera...";

    scanner=new Html5Qrcode("reader");

    try{

        await scanner.start(

            {

                facingMode:"environment"

            },

            {

                fps:10,

                qrbox:{

                    width:250,

                    height:250

                }

            },

            async function(decodedText){

                if(lendo)return;

                lendo=true;

                await scanner.stop();

                validar(decodedText);

            },

            function(error){}

        );

    }

    catch(e){

        document.getElementById("status").innerHTML=e;

        document.getElementById("btnCamera").style.display="block";

    }

}

async function validar(codigo){

    const status=document.getElementById("status");

    status.innerHTML="⏳ Validando inscrição...";


    try{

        const resposta = await fetch(

            API +
            "?codigo=" +
            encodeURIComponent(codigo)

        );


        const dados = await resposta.json();


        if(dados.status=="ok"){

            status.innerHTML=

            "<div class='ok'>" +

            "<h2>✅ CHECK-IN REALIZADO</h2>" +

            "<br><strong>"+dados.nome+"</strong>" +

            "<br>"+dados.inscricao +

            "</div>";

        }

        else if(dados.status=="duplicado"){

            status.innerHTML=

            "<div class='alerta'>" +

            "<h2>⚠ CHECK-IN JÁ REALIZADO</h2>" +

            "<br><strong>"+dados.nome+"</strong>" +

            "<br>Horário: "+dados.hora +

            "</div>";

        }

        else{

            status.innerHTML=

            "<div class='erro'>" +

            "<h2>❌ INSCRIÇÃO NÃO ENCONTRADA</h2>" +

            "</div>";

        }


    }

    catch(e){

        status.innerHTML=

        "<div class='erro'>" +

        "<h2>❌ ERRO</h2>" +

        "<br>"+e+

        "</div>";

    }


    status.innerHTML +=

    "<br><button onclick='novoLeitor()'>Próximo participante</button>";

}

function novoLeitor(){

    document.getElementById("reader").innerHTML="";

    document.getElementById("status").innerHTML="Clique para iniciar a câmera.";

    document.getElementById("btnCamera").style.display="block";

    iniciarCamera();

}

</script>

</body>

</html>
