<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Check-in - 4º Encontro</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:95%;
    max-width:500px;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    text-align:center;
}

h1{
    color:#C62828;
}

#reader{
    margin-top:20px;
    border:3px dashed #C62828;
    border-radius:15px;
    min-height:320px;
}

button{
    margin-top:20px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2E7D32;
    color:white;
    font-size:18px;
    cursor:pointer;
}

#status{
    margin-top:20px;
    font-weight:bold;
    color:#555;
}

</style>

</head>

<body>

<div class="card">

<h1>📷 CHECK-IN</h1>

<p>4º Encontro de Carros e Motos</p>

<div id="reader"></div>

<button id="btnCamera">
Iniciar câmera
</button>

<div id="status">
Aguardando...
</div>

</div>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let scanner = null;

document.getElementById("btnCamera").addEventListener("click", iniciarCamera);

async function iniciarCamera(){

    const status = document.getElementById("status");

    try{

        scanner = new Html5Qrcode("reader");

        await scanner.start(

            {
                facingMode: "environment"
            },

            {
                fps: 10,
                qrbox: { width: 250, height: 250 }
            },

            function(decodedText){

                status.innerHTML =
                "QR Code lido:<br><strong>" + decodedText + "</strong>";

            },

            function(error){

                // Ignora erros de leitura

            }

        );

    }

    catch(e){

        console.error(e);

        status.innerHTML = e;

    }

}

</script>
</body>
</html>
